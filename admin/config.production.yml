# Merged at build time into admin/config.yml (see scripts/sync-admin-config.mjs).
# This temporary demo configuration exposes only Contact and Press.

backend:
  name: git-gateway
  repo: artem434/clangsayne.com
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/e1c3a50f-6a6e-451e-bcc3-3badf0084dd3/pkce
  auth_token_endpoint: /sites/e1c3a50f-6a6e-451e-bcc3-3badf0084dd3/token
  gateway_url: https://gateway.decapbridge.com

  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg

site_url: https://myproject.artem4342232.workers.dev/
display_url: https://myproject.artem4342232.workers.dev/

collections:
  - name: "pages"
    label: "Pages"
    files:
      - name: "contact"
        label: "Contact"
        file: "src/content/pages/contact.json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - {
              label: "Hero HTML",
              name: "heroHtml",
              widget: "code",
              default_language: "html",
              output_code_only: true,
            }
          - label: "Body blocks"
            name: "bodyBlocks"
            widget: "list"
            types:
              - label: "Rich text block"
                name: "richtext"
                widget: object
                summary: "{{fields.label}}"
                fields:
                  - {
                      label: "Label",
                      name: "label",
                      widget: "string",
                      required: false,
                    }
                  - {
                      label: "Content",
                      name: "content",
                      widget: "richtext",
                      modes: ["rich_text", "raw"],
                    }
              - label: "HTML block"
                name: "html"
                widget: object
                summary: "{{fields.label}}"
                fields:
                  - {
                      label: "Label",
                      name: "label",
                      widget: "string",
                      required: false,
                    }
                  - {
                      label: "HTML",
                      name: "html",
                      widget: "code",
                      default_language: "html",
                      output_code_only: true,
                    }

      - name: "press"
        label: "Press"
        file: "src/content/pages/press.json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - {
              label: "Hero HTML",
              name: "heroHtml",
              widget: "code",
              default_language: "html",
              output_code_only: true,
            }
          - label: "Body blocks"
            name: "bodyBlocks"
            widget: "list"
            types:
              - label: "Rich text block"
                name: "richtext"
                widget: object
                summary: "{{fields.label}}"
                fields:
                  - {
                      label: "Label",
                      name: "label",
                      widget: "string",
                      required: false,
                    }
                  - {
                      label: "Content",
                      name: "content",
                      widget: "richtext",
                      modes: ["rich_text", "raw"],
                    }
              - label: "HTML block"
                name: "html"
                widget: object
                summary: "{{fields.label}}"
                fields:
                  - {
                      label: "Label",
                      name: "label",
                      widget: "string",
                      required: false,
                    }
                  - {
                      label: "HTML",
                      name: "html",
                      widget: "code",
                      default_language: "html",
                      output_code_only: true,
                    }

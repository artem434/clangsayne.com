backend:
  # Local development backend. Run `npx decap-server` alongside the site.
  name: git-gateway

local_backend:
  url: http://localhost:8083/api/v1

# Must match `npm run dev` (Eleventy --serve defaults to port 8080).
site_url: http://localhost:8080
display_url: http://localhost:8080

media_folder: "content/uploads"
public_folder: "/content/uploads"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - name: "contact"
        label: "Contact"
        file: "src/content/pages/contact.json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - {
              label: "Hero HTML",
              name: "heroHtml",
              widget: "code",
              default_language: "html",
              output_code_only: true,
            }
          - label: "Body blocks"
            name: "bodyBlocks"
            widget: "list"
            types:
              - label: "Rich text block"
                name: "richtext"
                widget: object
                summary: "{{fields.label}}"
                fields:
                  - {
                      label: "Label",
                      name: "label",
                      widget: "string",
                      required: false,
                    }
                  - {
                      label: "Content",
                      name: "content",
                      widget: "richtext",
                      modes: ["rich_text", "raw"],
                    }
              - label: "HTML block"
                name: "html"
                widget: object
                summary: "{{fields.label}}"
                fields:
                  - {
                      label: "Label",
                      name: "label",
                      widget: "string",
                      required: false,
                    }
                  - {
                      label: "HTML",
                      name: "html",
                      widget: "code",
                      default_language: "html",
                      output_code_only: true,
                    }

      - name: "press"
        label: "Press"
        file: "src/content/pages/press.json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - {
              label: "Hero HTML",
              name: "heroHtml",
              widget: "code",
              default_language: "html",
              output_code_only: true,
            }
          - label: "Body blocks"
            name: "bodyBlocks"
            widget: "list"
            types:
              - label: "Rich text block"
                name: "richtext"
                widget: object
                summary: "{{fields.label}}"
                fields:
                  - {
                      label: "Label",
                      name: "label",
                      widget: "string",
                      required: false,
                    }
                  - {
                      label: "Content",
                      name: "content",
                      widget: "richtext",
                      modes: ["rich_text", "raw"],
                    }
              - label: "HTML block"
                name: "html"
                widget: object
                summary: "{{fields.label}}"
                fields:
                  - {
                      label: "Label",
                      name: "label",
                      widget: "string",
                      required: false,
                    }
                  - {
                      label: "HTML",
                      name: "html",
                      widget: "code",
                      default_language: "html",
                      output_code_only: true,
                    }

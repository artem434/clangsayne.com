backend:
  name: git-gateway
  repo: artem434/clangsayne.com
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/e1c3a50f-6a6e-451e-bcc3-3badf0084dd3/pkce
  auth_token_endpoint: /sites/e1c3a50f-6a6e-451e-bcc3-3badf0084dd3/token
  gateway_url: https://gateway.decapbridge.com

  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg

site_url: https://compact-future-dom-convicted.trycloudflare.com
display_url: https://compact-future-dom-convicted.trycloudflare.com
media_folder: "content/uploads"
public_folder: "/content/uploads"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Home"
        file: "src/content/pages/home.json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Hero HTML", name: "heroHtml", widget: "code", default_language: "html", output_code_only: true }
          - { label: "CTA HTML", name: "ctaHtml", widget: "code", default_language: "html", output_code_only: true }

      - name: "about"
        label: "About"
        file: "src/content/pages/about.json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Left HTML", name: "leftHtml", widget: "code", default_language: "html", output_code_only: true }
          - { label: "Body HTML", name: "bodyHtml", widget: "code", default_language: "html", output_code_only: true }

      - name: "contact"
        label: "Contact"
        file: "src/content/pages/contact.json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Hero HTML", name: "heroHtml", widget: "code", default_language: "html", output_code_only: true }
          - { label: "Body HTML", name: "bodyHtml", widget: "code", default_language: "html", output_code_only: true }

      - name: "press"
        label: "Press"
        file: "src/content/pages/press.json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Hero HTML", name: "heroHtml", widget: "code", default_language: "html", output_code_only: true }
          - { label: "Body HTML", name: "bodyHtml", widget: "code", default_language: "html", output_code_only: true }

      - name: "dates"
        label: "Dates"
        file: "src/content/pages/dates.json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body HTML", name: "bodyHtml", widget: "code", default_language: "html", output_code_only: true }

      - name: "news_index"
        label: "News Index"
        file: "src/content/pages/news-index.json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body HTML", name: "bodyHtml", widget: "code", default_language: "html", output_code_only: true }

      - name: "works_index"
        label: "Works Index"
        file: "src/content/pages/works-index.json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body HTML", name: "bodyHtml", widget: "code", default_language: "html", output_code_only: true }

      - name: "shop_index"
        label: "Shop Index"
        file: "src/content/pages/shop-index.json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body HTML", name: "bodyHtml", widget: "code", default_language: "html" }

  - name: "news"
    label: "News"
    folder: "src/content/news"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "string" }
      - { label: "Excerpt", name: "excerpt", widget: "string", required: false }
      - label: "Hero Images"
        name: "heroImages"
        widget: "list"
        fields:
          - { label: "Image", name: "src", widget: "image" }
          - { label: "Alt", name: "alt", widget: "string" }
      - { label: "Body HTML", name: "bodyHtml", widget: "code", default_language: "html", output_code_only: true }
      - { label: "Order", name: "order", widget: "number", required: false }

  - name: "works"
    label: "Works"
    folder: "src/content/works"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Hero Title", name: "heroTitle", widget: "string", required: false }
      - { label: "Body HTML", name: "bodyHtml", widget: "code", default_language: "html" }
      - { label: "Order", name: "order", widget: "number", required: false }

  - name: "shop"
    label: "Shop"
    folder: "src/content/shop"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
      - { label: "Body HTML", name: "bodyHtml", widget: "code", default_language: "html" }
      - { label: "Order", name: "order", widget: "number", required: false }

backend:
  # Local development backend. Run `npx decap-server` alongside the site.
  name: git-gateway

local_backend:
  url: http://localhost:8083/api/v1

# Must match `npm run dev` (Eleventy --serve defaults to port 8080).
site_url: http://localhost:8080
display_url: http://localhost:8080
# Decap Media tab: only non-nested files in this folder (see decapcms#4208). Symlinks
# `content/uploads/_idx__*` mirror all images from 1-about, 2-news, 3-works, 5-shop, 6-press
# — refresh with: npm run media:index (also runs after import:content in prebuild).
media_folder: "content/uploads"
public_folder: "/content/uploads"
media_library:
  name: uploads

collections:
  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Home"
        file: "src/content/pages/home.json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Hero image", name: "heroImage", widget: "image", required: false }
          - {
              label: "Hero image alt text",
              name: "heroImageAlt",
              widget: "string",
              required: false,
            }
          - {
              label: "CTA HTML",
              name: "ctaHtml",
              widget: "code",
              default_language: "html",
              output_code_only: true,
            }

      - name: "about"
        label: "About"
        file: "src/content/pages/about.json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - {
              label: "Left HTML",
              name: "leftHtml",
              widget: "code",
              default_language: "html",
              output_code_only: true,
            }
          - {
              label: "Body HTML",
              name: "bodyHtml",
              widget: "code",
              default_language: "html",
              output_code_only: true,
            }

      - name: "contact"
        label: "Contact"
        file: "src/content/pages/contact.json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - {
              label: "Hero HTML",
              name: "heroHtml",
              widget: "code",
              default_language: "html",
              output_code_only: true,
            }
          - {
              label: "Body HTML",
              name: "bodyHtml",
              widget: "code",
              default_language: "html",
              output_code_only: true,
            }

      - name: "press"
        label: "Press"
        file: "src/content/pages/press.json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - {
              label: "Hero HTML",
              name: "heroHtml",
              widget: "code",
              default_language: "html",
              output_code_only: true,
            }
          - {
              label: "Body HTML",
              name: "bodyHtml",
              widget: "code",
              default_language: "html",
              output_code_only: true,
            }

      - name: "dates"
        label: "Dates"
        file: "src/content/pages/dates.json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - {
              label: "Body HTML",
              name: "bodyHtml",
              widget: "code",
              default_language: "html",
              output_code_only: true,
            }

      - name: "news_index"
        label: "News Index"
        file: "src/content/pages/news-index.json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - {
              label: "Body HTML",
              name: "bodyHtml",
              widget: "code",
              default_language: "html",
              output_code_only: true,
            }

      - name: "works_index"
        label: "Works Index"
        file: "src/content/pages/works-index.json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - {
              label: "Body HTML",
              name: "bodyHtml",
              widget: "code",
              default_language: "html",
              output_code_only: true,
            }

      - name: "shop_index"
        label: "Shop Index"
        file: "src/content/pages/shop-index.json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - {
              label: "Body HTML",
              name: "bodyHtml",
              widget: "code",
              default_language: "html",
              output_code_only: true,
            }

  - name: "news"
    label: "News"
    folder: "src/content/news"
    extension: json
    format: json
    create: true
    slug: "{{fields.slug}}"
    identifier_field: slug
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Slug (URL)"
        name: slug
        widget: string
        required: false
        hint: "Leave empty to auto-fill from Title on save (Latin, hyphens). Or set your own — it becomes the .json filename and site URL."
        pattern:
          [
            "^$|^[a-zA-Z0-9][a-zA-Z0-9-]*$",
            "Empty for auto-fill, or letters, numbers, hyphens only (any case).",
          ]
      - label: "Date"
        name: date
        widget: datetime
        default: ""
        picker_utc: false
        date_format: "DD.MM.YYYY"
        time_format: "HH:mm"
        format: "DD.MM.YYYY, HH:mm"
        hint: "Calendar + time (24h). Stored as DD.MM.YYYY, HH:mm — shown on the site as entered."
      - { label: "Excerpt", name: "excerpt", widget: "string", required: false }
      - label: "Hero Images"
        name: "heroImages"
        widget: "list"
        fields:
          - { label: "Image", name: "src", widget: "image" }
          - { label: "Alt", name: "alt", widget: "string" }
      - {
          label: "Body HTML",
          name: "bodyHtml",
          widget: "code",
          default_language: "html",
          output_code_only: true,
        }
      - { label: "Order", name: "order", widget: "number", required: false }

  - name: "works"
    label: "Works"
    folder: "src/content/works"
    extension: json
    format: json
    create: true
    slug: "{{fields.slug}}"
    identifier_field: slug
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Slug (URL)"
        name: slug
        widget: string
        required: false
        hint: "Leave empty to auto-fill from Title on save (Latin, hyphens). Or set your own — it becomes the .json filename and site URL."
        pattern:
          [
            "^$|^[a-zA-Z0-9][a-zA-Z0-9-]*$",
            "Empty for auto-fill, or letters, numbers, hyphens only (any case).",
          ]
      - {
          label: "Hero Title",
          name: "heroTitle",
          widget: "string",
          required: false,
        }
      - {
          label: "Body HTML",
          name: "bodyHtml",
          widget: "code",
          default_language: "html",
          output_code_only: true,
        }
      - { label: "Order", name: "order", widget: "number", required: false }

  - name: "shop"
    label: "Shop"
    folder: "src/content/shop"
    extension: json
    format: json
    create: true
    slug: "{{fields.slug}}"
    identifier_field: slug
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Slug (URL)"
        name: slug
        widget: string
        required: false
        hint: "Leave empty to auto-fill from Title on save (Latin, hyphens). Or set your own — it becomes the .json filename and site URL."
        pattern:
          [
            "^$|^[a-zA-Z0-9][a-zA-Z0-9-]*$",
            "Empty for auto-fill, or letters, numbers, hyphens only (any case).",
          ]
      - {
          label: "Subtitle",
          name: "subtitle",
          widget: "string",
          required: false,
        }
      - {
          label: "Body HTML",
          name: "bodyHtml",
          widget: "code",
          default_language: "html",
          output_code_only: true,
        }
      - { label: "Order", name: "order", widget: "number", required: false }
